<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Prestaciones Laborales RD</title>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-6B5LXKTVTS"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-6B5LXKTVTS');

<meta name="description" content="Calcula prestaciones laborales, cesantía, preaviso y derechos adquiridos en República Dominicana.">

<link rel="stylesheet" href="../css/styles.css">
<link rel="icon" href="../img/favicon.ico">
</head>

<body>

<header>
    <h1>CalculadoraRD</h1>

    <nav>
        <a href="../index.html">Inicio</a>
        <a href="../herramientas.html">Herramientas</a>
    </nav>
</header>

<section class="hero">

    <h2>Calculadora de Prestaciones Laborales RD</h2>

    <p>Calcula una estimación rápida de prestaciones.</p>

    <div class="card">

        <label>Salario Mensual (RD$)</label>
        <input type="number" id="salario">

        <br><br>

        <label>Años Trabajados</label>
        <input type="number" id="anios">

        <br><br>

        <button onclick="calcularPrestaciones()">
            Calcular
        </button>

        <div id="resultado"></div>

    </div>

</section>

<script>

function calcularPrestaciones(){

    let salario =
        parseFloat(document.getElementById("salario").value);

    let anios =
        parseFloat(document.getElementById("anios").value);

    if(isNaN(salario) || isNaN(anios)){
        alert("Complete todos los campos");
        return;
    }

    let cesantia =
        salario * anios * 0.5;

    let preaviso =
        salario * 0.25;

    let vacaciones =
        salario * 0.10;

    let total =
        cesantia + preaviso + vacaciones;

    document.getElementById("resultado").innerHTML = `
        <hr>

        <h3>Resultado Estimado</h3>

        <p>Cesantía: RD$ ${cesantia.toFixed(2)}</p>

        <p>Preaviso: RD$ ${preaviso.toFixed(2)}</p>

        <p>Vacaciones: RD$ ${vacaciones.toFixed(2)}</p>

        <h2>Total: RD$ ${total.toFixed(2)}</h2>
    `;
}

</script>

</body>
</html>
