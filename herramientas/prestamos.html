<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Préstamos</title>

<link rel="stylesheet" href="../css/styles.css">

</head>

<body>

<div class="card">

<h1>Calculadora de Préstamos</h1>

<p class="subtitulo">
Calcula la cuota mensual y visualiza tu tabla de amortización completa.
</p>

<label>Monto del préstamo (RD$)</label>
<input
id="monto"
type="text"
placeholder="Monto"
oninput="formatearInput(this)"
>

<label>Tasa anual (%)</label>
<input
id="tasa"
type="number"
placeholder="Tasa anual %"
>

<label>Plazo (meses)</label>
<input
id="meses"
type="number"
placeholder="Meses"
>

<button onclick="calcular()">
Calcular
</button>

<button onclick="descargarPDF()">
Descargar PDF
</button>

<button onclick="limpiar()">
Limpiar
</button>

<div id="resultado"></div>

<div class="tabla-container">
    <div id="tablaAmortizacion"></div>
</div>

</div>

<script>
function formatoRD(numero){
    return numero.toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}
function formatearInput(input){

    let valor =
    input.value.replace(/,/g, "");

    if(valor === "") return;

    input.value =
    Number(valor).toLocaleString("en-US");
}

function calcular(){

   let monto =
Number(
document.getElementById("monto")
.value.replace(/,/g, "")
);
    let tasa =
    Number(document.getElementById("tasa").value);

    let meses =
    Number(document.getElementById("meses").value);

    if(monto <= 0 || tasa <= 0 || meses <= 0){
        alert("Ingrese valores válidos");
        return;
    }

    let tasaMensual =
    (tasa / 100) / 12;

    let cuota =
    monto *
    (
        tasaMensual *
        Math.pow(1 + tasaMensual, meses)
    )
    /
    (
        Math.pow(1 + tasaMensual, meses) - 1
    );

    let totalPagado =
    cuota * meses;

    let intereses =
    totalPagado - monto;

    let porcentajeInteres =
(intereses / monto) * 100;

    document.getElementById("resultado").innerHTML = `
        <h3>Resultado</h3>

        <p><strong>Monto:</strong>
        RD$ ${formatoRD(monto)}</p>

        <p><strong>Cuota mensual:</strong>
        RD$ ${formatoRD(cuota)}</p>

        <p><strong>Total pagado:</strong>
        RD$ ${formatoRD(totalPagado)}</p>

        <p><strong>Intereses:</strong>
        RD$ ${formatoRD(intereses)}</p>

        <p><strong>% en intereses:</strong>
${formatoRD(porcentajeInteres)}%</p>
    `;

    let balance = monto;

let tabla = `
<h3>Tabla de Amortización</h3>

<table border="1" width="100%">
<tr>
<th>Mes</th>
<th>Cuota</th>
<th>Interés</th>
<th>Capital</th>
<th>Balance</th>
</tr>
`;

for(let i = 1; i <= meses; i++){

    let interesMes =
    balance * tasaMensual;

    let capitalMes =
    cuota - interesMes;

    balance =
    balance - capitalMes;

    tabla += `
    <tr>
        <td>${i}</td>
        <td>${formatoRD(cuota)}</td>
        <td>${formatoRD(interesMes)}</td>
        <td>${formatoRD(capitalMes)}</td>
        <td>${formatoRD(Math.max(balance,0))}</td>
    </tr>
    `;
}

tabla += "</table>";

document.getElementById("tablaAmortizacion").innerHTML =
tabla;
}

function limpiar(){

    

document.getElementById("monto").value="";
document.getElementById("tasa").value="";
document.getElementById("meses").value="";

document.getElementById("resultado").innerHTML="";
document.getElementById("tablaAmortizacion").innerHTML="";

}

</script>

</body>
</html>
