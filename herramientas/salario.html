<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Salario Neto RD</title>

<link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<header>
    <h1>CalculadoraRD</h1>

    <nav>
        <a href="../index.html">Inicio</a>
        <a href="../herramientas.html">Herramientas</a>
    </nav>
</header>

<section class="hero">

    <h2>Calculadora de Salario Neto RD</h2>

    <p>Calcula tu salario después de AFP y SFS.</p>

    <div class="card">

        <label>Salario Bruto (RD$)</label>

        <input
            type="number"
            id="salario"
            placeholder="Ejemplo: 30000"
        >

        <br><br>

        <button onclick="calcularSalario()">
            Calcular
        </button>

        <br><br>

        <div id="resultado"></div>

    </div>

</section>

<script>

function calcularSalario(){

    let salario =
        parseFloat(
            document.getElementById("salario").value
        );

    if(isNaN(salario)){
        alert("Ingrese un salario válido");
        return;
    }

    let afp = salario * 0.0287;
    let sfs = salario * 0.0304;

    let salarioNeto =
        salario - afp - sfs;

    document.getElementById("resultado").innerHTML = `
        <h3>Resultado</h3>

        <p>Salario Bruto: RD$ ${salario.toFixed(2)}</p>

        <p>AFP: RD$ ${afp.toFixed(2)}</p>

        <p>SFS: RD$ ${sfs.toFixed(2)}</p>

        <hr>

        <h2>Salario Neto: RD$ ${salarioNeto.toFixed(2)}</h2>
    `;
}

</script>

</body>
</html>
