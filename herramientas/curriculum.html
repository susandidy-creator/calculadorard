<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generador de Currículum Vitae RD</title>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-6B5LXKTVTS"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-6B5LXKTVTS');
</script>

<link rel="stylesheet" href="../css/styles.css">
<link rel="icon" href="../img/favicon.ico">

</head>
<body>

<div class="card">

<h1>📄 Generador de Currículum Vitae</h1>

<p>
Complete los datos para generar su currículum.
</p>

<label>Foto de Perfil</label>
<input type="file" id="foto" accept="image/*">

<label>Nombre completo</label>
<input type="text" id="nombre">

<label>Teléfono</label>
<input type="text" id="telefono">

<label>Correo electrónico</label>
<input type="email" id="correo">

<label>Perfil Profesional</label>
<textarea id="perfil"></textarea>

<label>Experiencia Laboral</label>
<textarea id="experiencia"></textarea>

<label>Educación</label>
<textarea id="educacion"></textarea>

<label>Habilidades</label>
<textarea id="habilidades"></textarea>

<br><br>

<button onclick="generarCV()">
Generar Currículum
</button>

<button onclick="imprimirCV()">
🖨️ Descargar PDF
</button>

<div id="resultado"></div>

</div>

<script>

function generarCV(){

    const fotoInput =
document.getElementById("foto");

fotoInput.addEventListener("change", function(){

    const archivo = this.files[0];

    if(!archivo) return;

    const lector = new FileReader();

    lector.onload = function(e){

        const imagen =
        document.getElementById("previewFoto");

        if(imagen){
            imagen.src = e.target.result;
        }

    };

    lector.readAsDataURL(archivo);

});

    function imprimirCV(){
    window.print();
}

let nombre =
document.getElementById("nombre").value;

let telefono =
document.getElementById("telefono").value;

let correo =
document.getElementById("correo").value;

let perfil =
document.getElementById("perfil").value;

let experiencia =
document.getElementById("experiencia").value;

let educacion =
document.getElementById("educacion").value;

let habilidades =
document.getElementById("habilidades").value;

document.getElementById("resultado").innerHTML = `

<div class="cv">

<div class="cv-header">

<div class="cv-foto">
    <img id="previewFoto">
</div>

<div class="cv-info">
    <h1>${nombre}</h1>

    <p>📞 ${telefono}</p>

    <p>✉️ ${correo}</p>
</div>

</div>

<hr>

<h2>Perfil Profesional</h2>
<p>${perfil}</p>

<h2>Experiencia Laboral</h2>
<p>${experiencia.replace(/\n/g,"<br>")}</p>

<h2>Educación</h2>
<p>${educacion.replace(/\n/g,"<br>")}</p>

<h2>Habilidades</h2>
<p>${habilidades.replace(/\n/g,"<br>")}</p>

</div>

`;

}

</script>

</body>
</html>
