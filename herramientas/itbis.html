<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de ITBIS RD</title>

<meta name="description" content="Calcula el ITBIS de manera rápida en República Dominicana. Obtén el impuesto y el total a pagar.">

<link rel="stylesheet" href="../css/styles.css">

</head>
<body>

<div class="card">

<h1>Calculadora de ITBIS RD</h1>

<p class="subtitulo">
Calcula el ITBIS (18%) incluido o agregado a un monto.
</p>

<label>Monto (RD$)</label>

<input
id="monto"
type="text"
placeholder="Ej: 10,000"
oninput="formatearInput(this)"
>

<button onclick="calcularITBIS()">
Calcular
</button>

<button onclick="limpiar()">
Limpiar
</button>

<div id="resultado"></div>

</div>

<script>

function formatoRD(numero){
    return numero.toLocaleString("en-US",{
        minimumFractionDigits:2,
        maximumFractionDigits:2
    });
}

function formatearInput(input){

    let valor =
    input.value.replace(/,/g,"");

    if(valor==="") return;

    input.value =
    Number(valor).toLocaleString("en-US");
}

function calcularITBIS(){

    let monto =
    Number(
    document.getElementById("monto")
    .value.replace(/,/g,"")
    );

    if(monto<=0){
        alert("Ingrese un monto válido");
        return;
    }

    let itbis =
    monto * 0.18;

    let total =
    monto + itbis;

    document.getElementById("resultado").innerHTML = `
    <h3>Resultado</h3>

    <p><strong>Monto:</strong>
    RD$ ${formatoRD(monto)}</p>

    <p><strong>ITBIS (18%):</strong>
    RD$ ${formatoRD(itbis)}</p>

    <p><strong>Total con ITBIS:</strong>
    RD$ ${formatoRD(total)}</p>
    `;
}

function limpiar(){

    document.getElementById("monto").value="";
    document.getElementById("resultado").innerHTML="";
}

</script>

</body>
</html>
