<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conversor USD ↔ DOP</title>

<link rel="stylesheet" href="../css/styles.css">

</head>
<body>

<div class="card">

<h1>💵 Conversor USD ↔ DOP</h1>

<p class="subtitulo">
Convierte dólares estadounidenses a pesos dominicanos y viceversa.
</p>

<label>Monto</label>
<input
id="monto"
type="number"
placeholder="Ingrese el monto"
>

<label>Tasa de cambio</label>
<input
id="tasa"
type="number"
value="59"
step="0.01"
>

<label>Conversión</label>
<select id="tipo">
    <option value="usd-dop">USD → DOP</option>
    <option value="dop-usd">DOP → USD</option>
</select>

<br><br>

<button onclick="convertir()">
Convertir
</button>

<button onclick="limpiar()">
Limpiar
</button>

<div id="resultado"></div>

</div>

<script>

function formatoRD(numero){
    return numero.toLocaleString("en-US",{
        minimumFractionDigits:2,
        maximumFractionDigits:2
    });
}

function convertir(){

    let monto =
    Number(document.getElementById("monto").value);

    let tasa =
    Number(document.getElementById("tasa").value);

    let tipo =
    document.getElementById("tipo").value;

    if(monto <= 0 || tasa <= 0){
        alert("Ingrese valores válidos");
        return;
    }

    let resultado;

    if(tipo === "usd-dop"){
        resultado = monto * tasa;

        document.getElementById("resultado").innerHTML = `
        <h3>Resultado</h3>
        <p>
        US$ ${formatoRD(monto)}
        =
        RD$ ${formatoRD(resultado)}
        </p>
        `;
    }else{

        resultado = monto / tasa;

        document.getElementById("resultado").innerHTML = `
        <h3>Resultado</h3>
        <p>
        RD$ ${formatoRD(monto)}
        =
        US$ ${formatoRD(resultado)}
        </p>
        `;
    }
}

function limpiar(){

    document.getElementById("monto").value="";
    document.getElementById("resultado").innerHTML="";
}

</script>

</body>
</html>
