<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora ISR RD | Impuesto Sobre la Renta</title>

<!-- Google tag (gtag.js) -->

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-6B5LXKTVTS');

<meta name="description" content="Calcula el ISR en República Dominicana según los rangos vigentes. Herramienta gratuita y actualizada.">

<link rel="stylesheet" href="../css/styles.css">
<link rel="icon" href="../img/favicon.ico">
</head>
<body>

<div class="card">

<h1>Calculadora ISR RD</h1>

<p>Calcula tu Impuesto Sobre la Renta anual.</p>

<label>Salario mensual (RD$)</label>
<input
id="salario"
type="number"
placeholder="Ej: 50000"
>

<button onclick="calcularISR()">
Calcular
</button>

<div id="resultado"></div>

</div>

<script>
    
function formatearInput(input){

    let valor =
    input.value.replace(/,/g,"");

    if(valor === "") return;

    input.value =
    Number(valor).toLocaleString("en-US");
}

function formatoRD(numero){
    return numero.toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}

function calcularISR(){

    let salarioMensual =
    Number(document.getElementById("salario").value.replace(/,/g,""));

    if(salarioMensual <= 0){
        alert("Ingrese un salario válido");
        return;
    }

    let salarioAnual =
    salarioMensual * 12;

    let isrAnual = 0;

    if(salarioAnual <= 416220){

        isrAnual = 0;

    }else if(salarioAnual <= 624329){

        isrAnual =
        (salarioAnual - 416220) * 0.15;

    }else if(salarioAnual <= 867123){

        isrAnual =
        31216 +
        ((salarioAnual - 624329) * 0.20);

    }else{

        isrAnual =
        79776 +
        ((salarioAnual - 867123) * 0.25);

    }

    let isrMensual =
    isrAnual / 12;

    document.getElementById("resultado").innerHTML = `

        <h3>Resultado</h3>

        <p><strong>Salario mensual:</strong>
        RD$ ${formatoRD(salarioMensual)}</p>

        <p><strong>Salario anual:</strong>
        RD$ ${formatoRD(salarioAnual)}</p>

        <p><strong>ISR anual:</strong>
        RD$ ${formatoRD(isrAnual)}</p>

        <p><strong>ISR mensual:</strong>
        RD$ ${formatoRD(isrMensual)}</p>

    `;
}

</script>

</body>
</html>
