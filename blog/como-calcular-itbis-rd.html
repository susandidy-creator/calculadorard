<h1>Cómo calcular el ITBIS en República Dominicana</h1>

<p>
El ITBIS es el Impuesto sobre Transferencias de Bienes Industrializados y Servicios.
Actualmente la tasa general es de 18%.
</p>

<h2>Ejemplo</h2>

<p>
Si un producto cuesta RD$ 1,000:
</p>

<p>
ITBIS = RD$ 1,000 × 18% = RD$ 180
</p>

<p>
Total = RD$ 1,180
</p>
